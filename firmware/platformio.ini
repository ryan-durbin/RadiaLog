; RadiaLog Firmware - PlatformIO Configuration
; Multi-board support: Seeed XIAO ESP32S3 + LilyGO T-Display S3
; Framework: Arduino
; USB Host mode for RadiaCode radiation detector
;
; Build a specific target:
;   pio run -e seeed_xiao_esp32s3
;   pio run -e lilygo_tdisplay_s3

[platformio]
;default_envs = seeed_xiao_esp32s3, lilygo_tdisplay_s3
default_envs = lilygo_tdisplay_s3

; =============================================================================
; Shared settings for all boards
; =============================================================================
[env]
platform = espressif32
framework = arduino

; USB OTG/Host mode (required for RadiaCode USB connection)
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0

; Common library dependencies
lib_deps =
    mikalhart/TinyGPSPlus @ ^1.0.3
    bblanchon/ArduinoJson @ ^7.0.0
    ottowinter/ESPAsyncWebServer-esphome @ ^3.1.0

; Monitor settings (FTDI adapter during development)
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

; =============================================================================
; Seeed XIAO ESP32S3 + Wio-SX1262
; =============================================================================
[env:seeed_xiao_esp32s3]
board = seeed_xiao_esp32s3
build_flags =
    ${env.build_flags}
    -DBOARD_XIAO_ESP32S3
board_build.partitions = default_8MB.csv
board_build.filesystem = littlefs

; =============================================================================
; LilyGO T-Display S3 (1.9" ST7789 170x320, parallel 8-bit)
; =============================================================================
[env:lilygo_tdisplay_s3]
board = lilygo-t-display-s3
build_flags =
    ${env.build_flags}
    -DBOARD_TDISPLAY_S3
    ; TFT_eSPI configuration for T-Display S3 parallel interface
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DCGRAM_OFFSET
    -DTFT_INVERSION_ON
    -DTFT_PARALLEL_8_BIT
    -DTFT_CS=6
    -DTFT_DC=7
    -DTFT_WR=8
    -DTFT_RD=9
    -DTFT_RST=5
    -DTFT_D0=39
    -DTFT_D1=40
    -DTFT_D2=41
    -DTFT_D3=42
    -DTFT_D4=45
    -DTFT_D5=46
    -DTFT_D6=47
    -DTFT_D7=48
    -DTFT_BL=38
    -DTFT_BACKLIGHT_ON=1
lib_deps =
    ${env.lib_deps}
    bodmer/TFT_eSPI @ ^2.5.0
board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs
