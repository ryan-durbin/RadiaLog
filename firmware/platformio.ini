; RadiaLog Firmware - PlatformIO Configuration
; Board: Seeed XIAO ESP32S3 + Wio-SX1262
; Framework: Arduino
; USB Host mode for RadiaCode radiation detector

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; USB OTG/Host mode (required for RadiaCode USB connection)
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0

; Library dependencies
lib_deps =
    mikalhart/TinyGPSPlus @ ^1.0.3
    bblanchon/ArduinoJson @ ^7.0.0
    lorol/LittleFS_esp32 @ ^1.0.6
    ottowinter/ESPAsyncWebServer-esphome @ ^3.1.0

; Monitor settings (FTDI adapter during development)
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Upload settings
upload_speed = 921600

; Partition scheme with room for LittleFS
board_build.partitions = default_8MB.csv
board_build.filesystem = littlefs
