; RadiaLog Firmware - PlatformIO Configuration
; Multi-board support: Seeed XIAO ESP32S3, LilyGO T-Display S3,
;                      Waveshare AMOLED 1.75-G, and more
; Framework: Arduino
; USB Host mode for RadiaCode radiation detector
;
; Build a specific target:
;   pio run -e seeed_xiao_esp32s3
;   pio run -e lilygo_tdisplay_s3
;   pio run -e waveshare_amoled_175

[platformio]
;default_envs = seeed_xiao_esp32s3, lilygo_tdisplay_s3
default_envs = seeed_xiao_esp32s3_plus, lilygo_tdisplay_s3

; =============================================================================
; Shared settings for all boards
; =============================================================================
[env]
platform = espressif32
framework = arduino

; USB OTG/Host mode (required for RadiaCode USB connection)
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0

; Common library dependencies
lib_deps =
    mikalhart/TinyGPSPlus @ ^1.0.3
    bblanchon/ArduinoJson @ ^7.0.0
    ottowinter/ESPAsyncWebServer-esphome @ ^3.1.0
    h2zero/NimBLE-Arduino @ ^1.4.0

; Exclude Syncthing conflict files from the build
src_filter = +<*> -<.git/> -<*.sync-conflict-*>

; Monitor settings (FTDI adapter during development)
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

; =============================================================================
; Seeed XIAO ESP32S3 + Wio-SX1262
; =============================================================================
[env:seeed_xiao_esp32s3]
board = seeed_xiao_esp32s3
build_flags =
    ${env.build_flags}
    -DBOARD_XIAO_ESP32S3
board_build.partitions = default_8MB.csv
board_build.filesystem = littlefs

; =============================================================================
; Seeed XIAO ESP32S3 Plus (ADC_BAT on GPIO10, external voltage divider required)
; =============================================================================
[env:seeed_xiao_esp32s3_plus]
board = seeed_xiao_esp32s3
build_flags =
    ${env.build_flags}
    -DBOARD_XIAO_ESP32S3_PLUS
board_build.partitions = default_8MB.csv
board_build.filesystem = littlefs

; =============================================================================
; LilyGO T-Display S3 (1.9" ST7789 170x320, parallel 8-bit)
; =============================================================================
[env:lilygo_tdisplay_s3]
board = lilygo-t-display-s3
build_flags =
    ${env.build_flags}
    -DBOARD_TDISPLAY_S3
    ; TFT_eSPI configuration for T-Display S3 parallel interface
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DCGRAM_OFFSET
    -DTFT_INVERSION_ON
    -DTFT_PARALLEL_8_BIT
    -DTFT_CS=6
    -DTFT_DC=7
    -DTFT_WR=8
    -DTFT_RD=9
    -DTFT_RST=5
    -DTFT_D0=39
    -DTFT_D1=40
    -DTFT_D2=41
    -DTFT_D3=42
    -DTFT_D4=45
    -DTFT_D5=46
    -DTFT_D6=47
    -DTFT_D7=48
    -DTFT_BL=38
    -DTFT_BACKLIGHT_ON=1
    ; Fonts — must be explicitly loaded when USER_SETUP_LOADED=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
lib_deps =
    ${env.lib_deps}
    bodmer/TFT_eSPI @ ^2.5.0
board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs

; =============================================================================
; LilyGO T-Display S3 AMOLED (1.91" RM67162 240x536, QSPI)
; =============================================================================
[env:lilygo_tdisplay_s3_amoled]
board = lilygo-t-display-s3
build_flags =
    ${env.build_flags}
    -DBOARD_TDISPLAY_S3_AMOLED
    ; TFT_eSPI configuration for RM67162 AMOLED QSPI interface
    -DUSER_SETUP_LOADED=1
    -DRM67162_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=536
    -DTFT_SPI_PORT=1
    -DTFT_CS=6
    -DTFT_MOSI=17
    -DTFT_SCLK=47
    -DTFT_DC=7
    -DTFT_RST=17
    -DTFT_BL=38
    -DTFT_BACKLIGHT_ON=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
lib_deps =
    ${env.lib_deps}
    bodmer/TFT_eSPI @ ^2.5.0
board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs

; =============================================================================
; Waveshare ESP32-S3 1.28" Round (240x240 GC9A01, SPI, circular)
; =============================================================================
[env:waveshare_round]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DBOARD_WAVESHARE_ROUND
    ; TFT_eSPI configuration for GC9A01 round display (SPI)
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MISO=-1
    -DTFT_MOSI=11
    -DTFT_SCLK=10
    -DTFT_CS=9
    -DTFT_DC=8
    -DTFT_RST=12
    -DTFT_BL=2
    -DTFT_BACKLIGHT_ON=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
lib_deps =
    ${env.lib_deps}
    bodmer/TFT_eSPI @ ^2.5.0
board_build.partitions = default_8MB.csv
board_build.filesystem = littlefs

; =============================================================================
; Waveshare ESP32-S3-Touch-AMOLED-1.75-G
; 466x466 circular AMOLED (CO5300 QSPI) + LC76G GPS (I2C) + AXP2101 PMU
; Uses LovyanGFX instead of TFT_eSPI for the QSPI display.
; =============================================================================
[env:waveshare_amoled_175]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DBOARD_WS_AMOLED_175
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
lib_deps =
    ${env.lib_deps}
    lovyan03/LovyanGFX @ ^1.2.0
    lewisxhe/XPowersLib @ ^0.2.6
board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs
board_build.arduino.memory_type = qio_opi

; =============================================================================
; Heltec Wireless Tracker V1.1 (0.96" ST7735S 160x80, SPI + UC6580 GPS)
; Vext (GPIO3 HIGH) powers GPS + display.  Battery divider gated by GPIO2.
; =============================================================================
[env:heltec_wireless_tracker]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DBOARD_HELTEC_TRACKER
    ; TFT_eSPI configuration for ST7735S SPI display (80x160 native)
    -DUSER_SETUP_LOADED=1
    -DST7735_DRIVER=1
    -DTFT_WIDTH=80
    -DTFT_HEIGHT=160
    -DTFT_MISO=-1
    -DTFT_MOSI=42
    -DTFT_SCLK=41
    -DTFT_CS=38
    -DTFT_DC=40
    -DTFT_RST=39
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=1
    -DTFT_RGB_ORDER=TFT_BGR
    -DCGRAM_OFFSET
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
lib_deps =
    ${env.lib_deps}
    bodmer/TFT_eSPI @ ^2.5.0
board_build.partitions = default_8MB.csv
board_build.filesystem = littlefs

; =============================================================================
; Adding a new board:
;   1. Create [env:your_board_name] below
;   2. Set -DBOARD_YOUR_BOARD in build_flags
;   3. Add the matching #elif block in config.h with pins + DISPLAY_WIDTH/HEIGHT
;   4. If it has a display, add the appropriate TFT library to lib_deps
;   5. For circular displays, also define DISPLAY_CIRCULAR in config.h
;   6. For QSPI displays, use LovyanGFX and define DISPLAY_DRIVER_LGFX
; =============================================================================
