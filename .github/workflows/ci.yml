name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [cpp, python, js]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        if: matrix.language == 'python'
        run: pip install ruff

      - name: Run ruff (Python lint)
        if: matrix.language == 'python'
        run: ruff check firmware/test/

      - name: Set up Node.js
        if: matrix.language == 'js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ESLint
        if: matrix.language == 'js'
        run: npm install --save-dev eslint

      - name: Lint embedded portal JS
        if: matrix.language == 'js'
        run: npx eslint firmware/src/portal/html/*.h --no-eslintrc --config .eslintrc.json --parser-options ecmaVersion:2020,sourceType:module

  tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run test suite
        run: |
          cd firmware/test
          python3 -m unittest discover -v

  build:
    name: Build (${{ matrix.env }})
    runs-on: ubuntu-latest
    needs: [lint, tests]
    strategy:
      fail-fast: false
      matrix:
        env:
          - seeed_xiao_esp32s3_plus
          - lilygo_tdisplay_s3_amoled
          - waveshare_amoled_175
          - heltec_wireless_tracker
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}

  release-binaries:
    name: Release Binaries
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build all boards
        run: |
          mkdir -p build-artifacts
          for env in seeed_xiao_esp32s3 seeed_xiao_esp32s3_plus lilygo_tdisplay_s3 lilygo_tdisplay_s3_amoled waveshare_round waveshare_amoled_175 heltec_wireless_tracker; do
            pio run -e $env
            cp .pio/build/$env/firmware.bin build-artifacts/radialog-${env}.bin
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: build-artifacts/*.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
